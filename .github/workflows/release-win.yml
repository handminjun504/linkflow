name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        shell: powershell
        env:
          DEBUG: electron-builder
        run: |
          $ErrorActionPreference = 'Continue'
          npm run build-installer -- --publish never 2>&1 | Tee-Object -FilePath build.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $lines = Get-Content build.log
            $focus = $lines | Where-Object { $_ -match 'error|Error|ERR|failed|Cannot|cannot' } | Select-Object -Last 40
            if (-not $focus -or $focus.Count -eq 0) {
              $focus = $lines | Select-Object -Last 40
            }
            $focus = $focus | ForEach-Object {
              if ($_ -match '??spawning\s+command=') { '[spawning command omitted]' }
              elseif ($_.Length -gt 240) { $_.Substring(0, 240) + '... [truncated]' }
              else { $_ }
            }
            $tail = $focus -join "`n"
            $escaped = $tail -replace '%', '%25'
            $escaped = $escaped -replace "`r", ''
            $escaped = $escaped -replace "`n", '%0A'
            Write-Output "::error title=build-installer failed::$escaped"
            exit $exitCode
          }

      - name: Normalize updater asset names
        shell: powershell
        run: |
          $latestPath = Join-Path $PWD 'dist/latest.yml'
          if (-not (Test-Path $latestPath)) {
            throw "dist/latest.yml not found"
          }

          $latest = Get-Content -Raw -Path $latestPath
          $pathMatch = [regex]::Match($latest, '(?m)^path:\s*["'']?(.+?)["'']?\s*$')
          if (-not $pathMatch.Success) {
            throw "Could not parse installer path from dist/latest.yml"
          }

          $expectedName = $pathMatch.Groups[1].Value.Trim()
          $expectedExe = Join-Path $PWD ("dist/" + $expectedName)
          $expectedBlockmap = "$expectedExe.blockmap"

          if (-not (Test-Path $expectedExe)) {
            $actualExe = Get-ChildItem -Path (Join-Path $PWD 'dist') -Filter '*.exe' | Select-Object -First 1
            if (-not $actualExe) {
              throw "No installer exe found in dist/"
            }

            Write-Host "Expected installer '$expectedName' missing. Renaming '$($actualExe.Name)' to '$expectedName'."
            Move-Item -Path $actualExe.FullName -Destination $expectedExe -Force

            $actualBlockmap = "$($actualExe.FullName).blockmap"
            if ((Test-Path $actualBlockmap) -and -not (Test-Path $expectedBlockmap)) {
              Move-Item -Path $actualBlockmap -Destination $expectedBlockmap -Force
            }
          }

          if (-not (Test-Path $expectedBlockmap)) {
            $fallbackBlockmap = Get-ChildItem -Path (Join-Path $PWD 'dist') -Filter '*.exe.blockmap' | Select-Object -First 1
            if ($fallbackBlockmap) {
              Move-Item -Path $fallbackBlockmap.FullName -Destination $expectedBlockmap -Force
            }
          }

          Write-Host "Updater assets verified for '$expectedName'."

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
