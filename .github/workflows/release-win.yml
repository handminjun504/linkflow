name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        shell: powershell
        env:
          DEBUG: electron-builder
        run: |
          $ErrorActionPreference = 'Continue'
          npm run build-installer -- --publish never 2>&1 | Tee-Object -FilePath build.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $lines = Get-Content build.log
            $focus = $lines | Where-Object { $_ -match 'error|Error|ERR|failed|Cannot|cannot' } | Select-Object -Last 40
            if (-not $focus -or $focus.Count -eq 0) {
              $focus = $lines | Select-Object -Last 40
            }
            $focus = $focus | ForEach-Object {
              if ($_ -match '??spawning\s+command=') { '[spawning command omitted]' }
              elseif ($_.Length -gt 240) { $_.Substring(0, 240) + '... [truncated]' }
              else { $_ }
            }
            $tail = $focus -join "`n"
            $escaped = $tail -replace '%', '%25'
            $escaped = $escaped -replace "`r", ''
            $escaped = $escaped -replace "`n", '%0A'
            Write-Output "::error title=build-installer failed::$escaped"
            exit $exitCode
          }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
